<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#247BD0">
  <meta name="description" content="Dompetku — Aplikasi pencatat keuangan dan tabungan pribadi">
  <title>Dompetku — Keuangan Pribadi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/output.css">
  <link rel="manifest" href="manifest.json">
</head>
<body class="bg-surface-muted min-h-screen font-sans">

  <div id="app">

    <!-- SETUP SCREEN -->
    <div id="screen-setup" class="hidden min-h-screen items-center justify-center px-6 py-10">
      <div class="w-full max-w-sm mx-auto">
        <div class="text-center mb-8">
          <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-primary to-primary-light mx-auto mb-4 flex items-center justify-center shadow-fab">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <h1 class="text-2xl font-extrabold text-ink">Dompetku</h1>
          <p class="text-ink-muted mt-1 text-sm">Atur keuanganmu dengan mudah</p>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-card">
          <h2 class="text-lg font-bold text-ink mb-1">Konfigurasi Awal</h2>
          <p class="text-xs text-ink-muted mb-5">Masukkan URL Google Apps Script Web App kamu.</p>
          <label class="block text-sm font-semibold text-ink mb-1.5">URL Apps Script</label>
          <input id="setup-url" type="url" placeholder="https://script.google.com/macros/s/..."
            class="w-full px-4 py-3 rounded-xl border-2 border-surface-dim bg-surface-muted text-sm text-ink placeholder:text-ink-light focus:border-primary focus:outline-none transition-colors mb-1">
          <p id="setup-url-error" class="text-xs text-danger hidden mb-3"></p>
          <button id="setup-btn" class="w-full mt-4 py-3.5 rounded-xl bg-gradient-to-r from-primary to-primary-light text-white font-bold text-sm shadow-fab active:scale-[0.98] transition-all flex items-center justify-center gap-2 cursor-pointer">
            <span id="setup-btn-text">Simpan &amp; Lanjutkan</span>
            <svg id="setup-btn-spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          </button>
        </div>
      </div>
    </div> test

    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="hidden min-h-screen items-center justify-center px-6 py-10">
      <div class="w-full max-w-sm mx-auto">
        <div class="text-center mb-8">
          <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-primary to-primary-light mx-auto mb-4 flex items-center justify-center shadow-fab">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <h1 class="text-2xl font-extrabold text-ink">Dompetku</h1>
          <p class="text-ink-muted mt-1 text-sm">Masuk ke akunmu</p>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-card">
          <div class="mb-4">
            <label class="block text-sm font-semibold text-ink mb-1.5">Username</label>
            <input id="login-username" type="text" placeholder="Masukkan username" autocomplete="username"
              class="w-full px-4 py-3 rounded-xl border-2 border-surface-dim bg-surface-muted text-sm text-ink placeholder:text-ink-light focus:border-primary focus:outline-none transition-colors">
          </div>
          <div class="mb-2">
            <label class="block text-sm font-semibold text-ink mb-1.5">Password</label>
            <div class="relative">
              <input id="login-password" type="password" placeholder="Masukkan password" autocomplete="current-password"
                class="w-full px-4 py-3 rounded-xl border-2 border-surface-dim bg-surface-muted text-sm text-ink placeholder:text-ink-light focus:border-primary focus:outline-none transition-colors pr-12">
              <button type="button" id="toggle-pw-btn" class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-light p-1 cursor-pointer">
                <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
          <p id="login-error" class="text-xs text-danger hidden mb-3"></p>
          <button id="login-btn" class="w-full mt-4 py-3.5 rounded-xl bg-gradient-to-r from-primary to-primary-light text-white font-bold text-sm shadow-fab active:scale-[0.98] transition-all cursor-pointer">
            Masuk
          </button>
        </div>
        <button id="goto-setup-btn" class="mt-4 text-xs text-ink-muted hover:text-primary transition-colors mx-auto block cursor-pointer">
          ⚙️ Ubah konfigurasi server
        </button>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="screen-main" class="hidden">
      <div class="lg:desktop-sidebar-layout">

        <!-- Desktop Sidebar (hidden on mobile) -->
        <aside class="desktop-sidebar">
          <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-light flex items-center justify-center shadow-card">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8V7m0 10v1"/></svg>
            </div>
            <span class="text-lg font-extrabold text-ink">Dompetku</span>
          </div>
          <div class="flex items-center gap-3 mb-6 p-3 bg-surface-muted rounded-xl">
            <div id="sidebar-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-primary-light flex items-center justify-center text-white font-bold text-sm shrink-0"></div>
            <div>
              <p id="sidebar-username" class="text-sm font-bold text-ink"></p>
              <p class="text-xs text-ink-muted">Akun Aktif</p>
            </div>
          </div>
          <nav class="flex flex-col gap-1 flex-1">
            <button data-nav="beranda" class="sidebar-nav-btn flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-ink-muted hover:bg-surface-muted transition-colors text-left cursor-pointer">
              <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
              Beranda
            </button>
            <button data-nav="tabungan" class="sidebar-nav-btn flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-ink-muted hover:bg-surface-muted transition-colors text-left cursor-pointer">
              <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
              Tabungan
            </button>
            <button data-nav="keuangan" class="sidebar-nav-btn flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-ink-muted hover:bg-surface-muted transition-colors text-left cursor-pointer">
              <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
              Keuangan
            </button>
            <button data-nav="riwayat" class="sidebar-nav-btn flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-ink-muted hover:bg-surface-muted transition-colors text-left cursor-pointer">
              <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              Riwayat
            </button>
          </nav>
          <div class="mt-auto pt-4 border-t border-surface-dim">
            <button id="sidebar-settings-btn" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-ink-muted hover:bg-surface-muted transition-colors w-full text-left cursor-pointer">
              <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
              Pengaturan
            </button>
            <button id="sidebar-logout-btn" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-danger hover:bg-danger/5 transition-colors w-full text-left cursor-pointer">
              <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              Keluar
            </button>
          </div>
        </aside>

        <!-- Main Content -->
        <div class="desktop-main pb-24 lg:pb-6">
          <!-- Mobile Header -->
          <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-surface-dim px-5 py-3.5 lg:hidden">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div id="header-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-primary to-primary-light flex items-center justify-center text-white font-bold text-sm shrink-0"></div>
                <div>
                  <h2 id="header-greeting" class="text-sm font-bold text-ink"></h2>
                  <p id="header-date" class="text-xs text-ink-muted"></p>
                </div>
              </div>
              <button id="header-settings-btn" class="w-10 h-10 rounded-xl bg-surface-muted flex items-center justify-center text-ink-muted hover:bg-surface-dim transition-colors cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </header>

          <!-- Page containers (JS renders content into these) -->
          <div id="page-beranda" class="page active px-5 pt-5 pb-4 lg:px-0"></div>
          <div id="page-tabungan" class="page px-5 pt-5 pb-4 lg:px-0"></div>
          <div id="page-tabungan-detail" class="page px-5 pt-5 pb-4 lg:px-0"></div>
          <div id="page-keuangan" class="page px-5 pt-5 pb-4 lg:px-0"></div>
          <div id="page-riwayat" class="page px-5 pt-5 pb-4 lg:px-0"></div>

          <!-- FAB -->
          <button id="fab-btn" class="hidden fixed z-30 w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-primary-light text-white shadow-fab items-center justify-center active:scale-90 transition-transform cursor-pointer" style="bottom:90px;right:20px;">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
          </button>
        </div>
      </div>

      <!-- Mobile Bottom Nav -->
      <nav class="mobile-bottom-nav fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-40 bg-white/90 backdrop-blur-xl border-t border-surface-dim px-2 pt-2" style="padding-bottom:max(env(safe-area-inset-bottom),12px);">
        <div class="flex items-center justify-around">
          <button data-nav="beranda" class="nav-item active flex flex-col items-center gap-1 py-1 px-3 cursor-pointer">
            <div class="nav-icon w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-300">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            </div>
            <span class="nav-label text-[10px] font-semibold text-ink-muted transition-colors">Beranda</span>
          </button>
          <button data-nav="tabungan" class="nav-item flex flex-col items-center gap-1 py-1 px-3 cursor-pointer">
            <div class="nav-icon w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-300">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            </div>
            <span class="nav-label text-[10px] font-semibold text-ink-muted transition-colors">Tabungan</span>
          </button>
          <button data-nav="keuangan" class="nav-item flex flex-col items-center gap-1 py-1 px-3 cursor-pointer">
            <div class="nav-icon w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-300">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            </div>
            <span class="nav-label text-[10px] font-semibold text-ink-muted transition-colors">Keuangan</span>
          </button>
          <button data-nav="riwayat" class="nav-item flex flex-col items-center gap-1 py-1 px-3 cursor-pointer">
            <div class="nav-icon w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-300">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <span class="nav-label text-[10px] font-semibold text-ink-muted transition-colors">Riwayat</span>
          </button>
        </div>
      </nav>
    </div>

  </div>

  <!-- Modal injection point -->
  <div id="modal-root"></div>

  <!-- Toast notifications -->
  <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-full max-w-[400px] px-5 pointer-events-none lg:bottom-8"></div>

  <!-- External scripts (deferred for fast paint) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
  <script src="src/app.js" defer></script>
</body>
</html>
